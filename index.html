    <!-- 終極全域防護：只要發生任何不可預期錯誤，立刻顯示紅底警告，絕不留白 -->
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            document.body.innerHTML = '<div style="background:#fef2f2;color:#9f1239;padding:32px;min-height:100vh;font-family:sans-serif;box-sizing:border-box;"><div style="background:#fff;padding:24px;border-radius:12px;border:2px solid #e11d48;box-shadow:0 10px 15px -3px rgba(0,0,0,0.1);"><h2 style="margin-top:0;font-size:20px;font-weight:900;">🚨 網頁發生致命錯誤</h2><p style="font-weight:bold;margin-bottom:12px;">錯誤代碼：</p><pre style="background:#f1f5f9;padding:12px;border-radius:8px;font-size:12px;overflow-x:auto;">' + msg + '</pre><p style="margin-top:16px;font-size:14px;">請將此畫面截圖提供給 AI 進行修復。</p></div></div>';
            return false;
        };
        window.addEventListener('unhandledrejection', function(event) {
            var reason = event.reason ? (event.reason.stack || event.reason.toString()) : '未知錯誤';
            if(reason.includes('auth/configuration-not-found')) return; // 由 React 內部處理
            document.body.innerHTML = '<div style="background:#fef2f2;color:#9f1239;padding:32px;min-height:100vh;font-family:sans-serif;box-sizing:border-box;"><div style="background:#fff;padding:24px;border-radius:12px;border:2px solid #e11d48;box-shadow:0 10px 15px -3px rgba(0,0,0,0.1);"><h2 style="margin-top:0;font-size:20px;font-weight:900;">🚨 非同步載入失敗</h2><p style="font-weight:bold;margin-bottom:12px;">錯誤代碼：</p><pre style="background:#f1f5f9;padding:12px;border-radius:8px;font-size:12px;overflow-x:auto;">' + reason + '</pre><p style="margin-top:16px;font-size:14px;">請將此畫面截圖提供給 AI 進行修復。</p></div></div>';
        });
    </script>

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, errorInfo: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, errorInfo: error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ minHeight: '100vh', backgroundColor: '#fef2f2', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '32px', fontFamily: 'sans-serif', boxSizing: 'border-box' }}>

                                <h2 style={{ fontSize: '20px', fontWeight: 'bold', color: '#e11d48', marginBottom: '16px', marginTop: 0 }}>🚨 渲染發生錯誤</h2>

        const App = () => {
            const [user, setUser] = useState(null);
            const [isPageLocked, setIsPageLocked] = useState(true); 
            const [entryPassword, setEntryPassword] = useState('');
            const [activeTab, setActiveTab] = useState('checkout');
            const [records, setRecords] = useState([]);
            
            const [firebaseError, setFirebaseError] = useState(null);

            const [isAdminMode, setIsAdminMode] = useState(false);
            const [isAdminModalOpen, setIsAdminModalOpen] = useState(false);
            const [adminInputPassword, setAdminInputPassword] = useState('');

            const [showScanner, setShowScanner] = useState(false);
            const [scannerTarget, setScannerTarget] = useState('checkout'); 
            const [historySearchTerm, setHistorySearchTerm] = useState('');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [showOnlyOverdue, setShowOnlyOverdue] = useState(false);

            const [checkoutSuccessCode, setCheckoutSuccessCode] = useState(null);
            const [isVerifyReturnOpen, setIsVerifyReturnOpen] = useState(false);

            const [verifyError, setVerifyError] = useState(false);
            const [showOverdueModal, setShowOverdueModal] = useState(false);
            const [returnSearchQuery, setReturnSearchQuery] = useState(''); 
            const [selectedItemsToReturn, setSelectedItemsToReturn] = useState([]); 

            const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(false);
            const [deletePassword, setDeletePassword] = useState('');
            const [pendingDeleteIds, setPendingDeleteIds] = useState([]);
            const [passwordError, setPasswordError] = useState(false);
            const [toastMsg, setToastMsg] = useState('');

            const [formData, setFormData] = useState({ user: '', empId: '', itemInput: '' });
            const [tempItems, setTempItems] = useState([]);
            const [inputError, setInputError] = useState('');
            const [selectedHistoryIds, setSelectedHistoryIds] = useState([]);
            
            const html5QrCodeRef = useRef(null);

            const maskEmpId = (id) => {
                if (!id) return '';
                const str = String(id);
                if (str.length <= 2) return str;
                return "X".repeat(str.length - 2) + str.slice(-2);
            };

            const isOverdue = (dateString) => Math.ceil(Math.abs(new Date() - new Date(dateString)) / (1000 * 60 * 60 * 24)) > 3;

            const calculateHours = (start, end = new Date()) => {
                const diff = Math.abs(new Date(end) - new Date(start));
                return (diff / (1000 * 60 * 60)).toFixed(2);
            };

            const formatFullDateTime = (dateString) => {
                if (!dateString) return '';
                const d = new Date(dateString);
                return d.toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
            };

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 2500);
            };

            const activeRecords = useMemo(() => records.filter(r => r.status === 'Checked Out'), [records]);
            
            const usagePeopleCount = activeRecords.length;
            const totalItemsLent = useMemo(() => activeRecords.reduce((acc, rec) => acc + (rec.items?.length || 0), 0), [activeRecords]);
            const overdueItemsCount = useMemo(() => activeRecords.filter(r => isOverdue(r.date)).reduce((acc, rec) => acc + (rec.items?.length || 0), 0), [activeRecords]);

            const displayedActiveRecords = useMemo(() => {
                const list = showOnlyOverdue ? activeRecords.filter(r => isOverdue(r.date)) : activeRecords;
                return [...list].sort((a, b) => {
                    const overdueA = isOverdue(a.date);
                    const overdueB = isOverdue(b.date);
                    if (overdueA && !overdueB) return -1;
                    if (!overdueA && overdueB) return 1;
                    return new Date(b.date) - new Date(a.date);
                });
            }, [activeRecords, showOnlyOverdue]);

            const filteredHistoryRecords = useMemo(() => {
                return records.filter(r => {
                    const term = historySearchTerm.toUpperCase();
                    const matchesSearch = r.user?.toUpperCase().includes(term) || (r.empId || '').toUpperCase().includes(term) || r.items?.some(i => i.toUpperCase().includes(term));
                    const recordDate = new Date(r.date);
                    const start = startDate ? new Date(startDate) : null;
                    const end = endDate ? new Date(endDate) : null;
                    if (end) end.setHours(23, 59, 59, 999);
                    return matchesSearch && (!start || recordDate >= start) && (!end || recordDate <= end);
                });
            }, [records, historySearchTerm, startDate, endDate]);

            const groupedHistory = useMemo(() => {
                const groups = {};
                filteredHistoryRecords.forEach(rec => {
                    const dateKey = new Date(rec.returnDate || rec.date).toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
                    if (!groups[dateKey]) groups[dateKey] = [];
                    groups[dateKey].push(rec);
                });
                return Object.keys(groups).sort((a, b) => new Date(b) - new Date(a)).map(date => ({
                    date, data: groups[date].sort((a, b) => a.status === 'Checked Out' ? -1 : 1)
                }));
            }, [filteredHistoryRecords]);

            const handleEntry = () => {
                if (entryPassword === '620026') setIsPageLocked(false);
                else { setPasswordError(true); setTimeout(() => setPasswordError(false), 1000); }
            };

            const handleAdminLogin = () => {
                if (adminInputPassword === '168168') {
                    setIsAdminMode(true); setIsAdminModalOpen(false); setAdminInputPassword(''); showToast('管理員視圖已解鎖');
                } else { setPasswordError(true); setTimeout(() => setPasswordError(false), 1000); }
            };

            const addSocketToTemp = (code) => {
                const socketId = code.trim().toUpperCase();
                if (!socketId) return;
                if (!socketId.startsWith('SK')) {
                    setInputError('請確認Socket編號是否正確'); return;
                }
                if (tempItems.includes(socketId)) {
                    setInputError(`編號 ${socketId} 已在清單中`); return;
                }
                const owner = activeRecords.find(r => r.items.includes(socketId));
                if (owner) {
                    setInputError(`編號 ${socketId} 正被 ${owner.user} 領用`); return;
                }
                setTempItems(prev => [socketId, ...prev]); 
                setFormData(prev => ({ ...prev, itemInput: '' }));
                setInputError('');
            };

            const executeCheckout = async () => {
                setShowOverdueModal(false);
                const allowedDigits = '012356789';
                let returnCode = '';
                for (let i = 0; i < 4; i++) returnCode += allowedDigits.charAt(Math.floor(Math.random() * allowedDigits.length));
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('records').add({
                        user: formData.user, empId: formData.empId, returnCode: returnCode, items: [...tempItems], date: new Date().toISOString(), status: 'Checked Out', createdAt: Date.now()
                    });
                    setCheckoutSuccessCode(returnCode); setFormData({ user: '', empId: '', itemInput: '' }); setTempItems([]);
                } catch (err) { console.error(err); }
            };

            const handleCheckoutClick = () => {
                if (tempItems.length === 0 || !formData.user || !formData.empId) return;
                const userOverdue = records.filter(r => r.user.trim() === formData.user.trim() && r.status === 'Checked Out' && isOverdue(r.date));
                if (userOverdue.length > 0) { setShowOverdueModal(true); return; }
                executeCheckout();
            };

            const executeReturnVerify = async () => {
                const groups = {};
                selectedItemsToReturn.forEach(key => {
                    const [rid, val] = key.split('|');
                    if (!groups[rid]) groups[rid] = [];
                    groups[rid].push(val);
                });
                const firstRecordId = Object.keys(groups)[0];

                                    </div>
                                    <div className="flex items-center gap-3 mb-8 px-1 overflow-hidden">
                                        <input type="text" className={`flex-1 min-w-0 bg-slate-50 border-2 rounded-2xl px-5 py-4 text-base font-bold outline-none transition-all uppercase ${inputError ? 'border-rose-500 bg-rose-50' : 'border-slate-100 focus:border-blue-600'}`} placeholder="輸入SK編號..." value={formData.itemInput} onChange={(e) => {setFormData({...formData, itemInput: e.target.value.toUpperCase()}); setInputError('');}} onKeyPress={(e) => e.key === 'Enter' && addSocketToTemp(formData.itemInput)} />
                                        <button onClick={() => addSocketToTemp(formData.itemInput)} className="w-14 h-14 bg-slate-900 text-white rounded-2xl flex-none flex items-center justify-center font-bold text-3xl shadow-md active:scale-90">+</button>
                                    </div>
                                    <div className="flex justify-between items-center mb-4 px-1">
                                        <label className="text-slate-400 font-black text-xs uppercase flex items-center gap-2">待登記清單 <span className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full text-[10px]">{tempItems.length}</span></label>
                                    </div>
                                    <div className="space-y-3 mb-8 min-h-[120px] max-h-[350px] overflow-y-auto no-scrollbar border-y border-slate-50 py-3">
                                        {tempItems.map((item, i) => (
                                            <div key={item + i} className="flex justify-between items-center px-5 py-4 rounded-2xl border bg-blue-50/50 border-blue-100 animate-in zoom-in-95">
                                                <span className="font-mono font-black text-lg uppercase text-blue-900">{item}</span>
                                                <button onClick={() => setTempItems(prev => prev.filter((_, idx) => idx !== i))} className="text-rose-400 p-2 active:scale-90 ml-2"><span className="icon-wrapper"><Icon name="trash-2" className="w-6 h-6" /></span></button>
                                            </div>
                                        ))}
                                        {tempItems.length === 0 && <div className="py-12 text-center text-slate-300 font-black italic border-2 border-dashed border-slate-100 rounded-2xl text-sm">目前清單為空</div>}
                                    </div>
                                    <button disabled={tempItems.length === 0 || !formData.user || !formData.empId} onClick={handleCheckoutClick} className="w-full py-6 bg-blue-600 text-white rounded-[2rem] font-black text-xl shadow-xl active:scale-[0.98] disabled:bg-slate-100 disabled:text-slate-300 flex items-center justify-center gap-3 transition-all"><span className="icon-wrapper"><Icon name="check-circle-2" className="w-7 h-7" /></span> 確認登記領出</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'return' && (
                            <div className="space-y-4 animate-in fade-in duration-300 pb-10">
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border-t-8 border-emerald-500 border border-slate-200 text-slate-800">
                                    <div className="flex flex-col gap-4 mb-6">
                                        <div className="marquee-box bg-rose-50 rounded-xl py-2.5 border border-rose-100">
                                            <div className="marquee-text text-[12px] font-black text-rose-600">⚠️ 溫馨提醒：歸還請務必放置於歸還箱，感謝您的配合～</div>
                                        </div>
                                        <div className="flex justify-end gap-2 shrink-0">
                                            <button onClick={() => startScanner('return')} className="px-6 py-2.5 bg-blue-600 text-white rounded-xl shadow-lg text-sm font-black flex items-center gap-1.5 active:scale-95 transition-all"><span className="icon-wrapper"><Icon name="qr-code" className="w-5 h-5" /></span> 掃描</button>
                                            <button disabled={selectedItemsToReturn.length === 0} onClick={() => { if (selectedItemsToReturn.length > 0) setIsVerifyReturnOpen(true); }} className={`px-5 py-2.5 rounded-xl font-black text-sm shadow-lg flex items-center gap-2 transition-all active:scale-95 ${selectedItemsToReturn.length > 0 ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-300'}`}><span className="icon-wrapper"><Icon name="package-check" className="w-5 h-5" /></span> 執行歸還 ({selectedItemsToReturn.length})</button>
                                        </div>
                                    </div>
                                    <div className="relative mb-6">
                                        <span className="icon-wrapper absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"><Icon name="search" className="w-5 h-5" /></span>
                                        <input type="text" className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl pl-12 pr-4 py-5 text-base font-bold outline-none focus:border-emerald-600 transition-all uppercase" placeholder="搜尋人名、編號或工號..." value={returnSearchQuery} onChange={(e) => setReturnSearchQuery(e.target.value.toUpperCase())} />
                                    </div>
                                    <div className="space-y-4 min-h-[200px] no-scrollbar">
                                        {activeRecords.filter(r => (r.user.toUpperCase().includes(returnSearchQuery) || (r.empId || '').toUpperCase().includes(returnSearchQuery) || r.items.some(i => i.toUpperCase().includes(returnSearchQuery)))).map(rec => (
                                            <div key={rec.id} className={`rounded-[2rem] border-2 p-5 bg-white shadow-sm transition-all ${isOverdue(rec.date) ? 'border-rose-100' : 'border-slate-100'}`}>
                                                <div className="flex justify-between items-start mb-3">
                                                    <div className="flex flex-col gap-1">
                                                        <div className="flex items-center gap-2">
                                                            <span className="font-black text-base px-4 py-1 rounded-xl bg-slate-100">{rec.user}</span>
                                                            {isOverdue(rec.date) && <span className="text-[10px] font-black text-white bg-rose-600 px-2 py-0.5 rounded-lg animate-pulse">逾期</span>}
                                                        </div>
                                                        <span className={`text-[11px] font-bold px-1 ${isOverdue(rec.date) ? 'text-rose-600' : 'text-slate-400'}`}>領出：{formatFullDateTime(rec.date)}</span>
                                                    </div>
                                                    <button onClick={() => { const keys = rec.items.map(i => `${rec.id}|${i}`); const allSel = keys.every(k => selectedItemsToReturn.includes(k)); setSelectedItemsToReturn(prev => allSel ? prev.filter(k => !keys.includes(k)) : [...new Set([...prev, ...keys])]); }} className="text-sm font-bold text-blue-500 underline">全選</button>
                                                </div>
                                                <div className="grid grid-cols-1 gap-2.5">
                                                    {rec.items.map(item => {
                                                        const key = `${rec.id}|${item}`; const sel = selectedItemsToReturn.includes(key);
                                                        return (
                                                            <div key={item} onClick={() => setSelectedItemsToReturn(sel ? selectedItemsToReturn.filter(k => k !== key) : [...selectedItemsToReturn, key])} className={`px-5 py-4 rounded-2xl border flex justify-between items-center cursor-pointer transition-all ${sel ? 'bg-emerald-50 border-emerald-300 shadow-inner' : 'bg-white border-slate-100'}`}>
                                                                <span className="font-mono text-base font-bold text-slate-600 uppercase">{item}</span>
                                                                <span className="icon-wrapper"><CheckIcon selected={sel} /></span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'in_use' && (
                            <div className="space-y-4 animate-in fade-in duration-300 pb-10 text-slate-800">
                                <div className="flex justify-between items-center px-2 py-2">
                                    <div className="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><span className="icon-wrapper"><Icon name="clock" className="w-4 h-4" /></span>全部領用 ({activeRecords.length})</div>
                                    <button onClick={() => setShowOnlyOverdue(!showOnlyOverdue)} className={`px-5 py-2 rounded-full text-xs font-black shadow-sm ${showOnlyOverdue ? 'bg-rose-500 text-white' : 'bg-slate-200 text-slate-500'}`}>{showOnlyOverdue ? "顯示全部" : "只看逾期"}</button>
                                </div>
                                {displayedActiveRecords.map(rec => (
                                    <div key={rec.id} className={`bg-white rounded-[2rem] p-6 border-l-[12px] shadow-sm transition-all ${isOverdue(rec.date) ? 'border-rose-600 bg-rose-50/10' : 'border-blue-600'}`}>
                                        <div className="flex justify-between items-center mb-5">
                                            <div className="flex flex-col gap-1">
                                                <div className="flex items-center gap-2.5">
                                                    <span className={`px-5 py-1.5 rounded-xl font-black text-base ${isOverdue(rec.date) ? 'bg-rose-100 text-rose-700' : 'bg-blue-100 text-blue-700'}`}>{rec.user}</span>
                                                    <span className={`text-[10px] font-black uppercase px-2.5 py-1 rounded-lg ${isOverdue(rec.date) ? 'bg-rose-500 text-white animate-pulse' : 'bg-blue-500 text-white'}`}>{isOverdue(rec.date) ? '逾期' : '工作中'}</span>
                                                </div>
                                                <div className="flex gap-2 mt-1">
                                                    {rec.empId && <span className="text-[10px] font-black text-slate-400 bg-slate-100 px-2 py-0.5 rounded-md tracking-tighter uppercase">工號：{isAdminMode ? rec.empId : maskEmpId(rec.empId)}</span>}
                                                    {isAdminMode && rec.returnCode && <span className="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md shadow-sm uppercase">密碼：{rec.returnCode}</span>}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex flex-wrap gap-2.5 mb-5">{rec.items.map(i => <span key={i} className="px-4 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-mono font-bold uppercase">{i}</span>)}</div>
                                        <div className="text-xs font-black text-slate-400 border-t border-slate-50 pt-5 flex justify-between items-center">
                                            <div className="flex items-center gap-1.5 font-bold text-slate-500"><span className="icon-wrapper"><Icon name="calendar" className="w-4 h-4" /></span>領出：{formatFullDateTime(rec.date)} <span className="text-blue-600 ml-1">({calculateHours(rec.date)} 小時)</span></div>
                                            <button onClick={() => { setActiveTab('return'); setReturnSearchQuery(rec.user.toUpperCase()); }} className="bg-slate-900 text-white px-5 py-2 rounded-xl font-black text-xs uppercase shadow-md active:bg-slate-700">前往歸還</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-4 pb-20 animate-in fade-in duration-300 text-slate-800">
                                <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-200 space-y-5">
                                    <div className="relative">
                                        <span className="icon-wrapper absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"><Icon name="search" className="w-5 h-5" /></span>
                                        <input type="text" className="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-blue-500 font-bold text-base shadow-inner transition-all uppercase" placeholder="搜尋姓名、工號或編號..." value={historySearchTerm} onChange={(e) => setHistorySearchTerm(e.target.value.toUpperCase())} />
                                    </div>
                                    <div className="space-y-4">
                                        <div className="grid grid-cols-2 gap-3 text-slate-500">
                                            <div className="space-y-1.5">
                                                <label className="text-[11px] font-black uppercase ml-2">開始日期</label>
                                                <input type="date" className="w-full bg-slate-50 border-2 border-slate-100 rounded-xl px-3 py-3 text-sm font-bold text-slate-800" value={startDate} onChange={e => setStartDate(e.target.value)} />
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[11px] font-black uppercase ml-2">結束日期</label>
                                                <input type="date" className="w-full bg-slate-50 border-2 border-slate-100 rounded-xl px-3 py-3 text-sm font-bold text-slate-800" value={endDate} onChange={e => setEndDate(e.target.value)} />
                                            </div>
                                        </div>
                                        <button onClick={exportCSV} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-sm flex items-center justify-center gap-2.5 shadow-md active:bg-slate-700 transition-all">
                                            <span className="icon-wrapper"><Icon name="file-spreadsheet" className="text-green-400 w-5 h-5" /></span> 匯出使用紀錄 (CSV)
                                        </button>
                                        <div className="flex justify-between items-center px-1 pt-2 border-t border-slate-100">
                                            <button onClick={() => selectedHistoryIds.length === filteredHistoryRecords.length ? setSelectedHistoryIds([]) : setSelectedHistoryIds(filteredHistoryRecords.map(r => r.id))} className="text-[11px] font-black text-blue-600 underline">全選目前結果</button>
                                            {selectedHistoryIds.length > 0 && <button onClick={batchPrepareHistoryDelete} className="bg-rose-100 text-rose-700 px-4 py-2 rounded-xl font-black text-[11px] flex items-center gap-1.5 border border-rose-200"><span className="icon-wrapper"><Icon name="trash-2" className="w-3.5 h-3.5" /></span> 刪除所選 ({selectedHistoryIds.length})</button>}
                                        </div>
                                    </div>
                                </div>
                                {groupedHistory.map(g => (
                                    <div key={g.date} className="space-y-3">
                                        <div className="text-xs font-black text-slate-400 uppercase py-2 tracking-widest pl-3 flex items-center gap-2"><span className="icon-wrapper"><Icon name="calendar-days" className="w-4 h-4" /></span> {g.date}</div>
                                        {g.data.map(rec => (
                                            <div key={rec.id} className={`bg-white rounded-[2rem] p-6 border shadow-sm flex group transition-all relative gap-4 ${selectedHistoryIds.includes(rec.id) ? 'border-blue-400 bg-blue-50/20' : 'border-slate-100'}`}>
                                                <div className="flex flex-col justify-center pt-1" onClick={() => toggleHistorySelection(rec.id)}>
                                                    <div className={`w-6 h-6 rounded-lg border-2 flex items-center justify-center transition-all ${selectedHistoryIds.includes(rec.id) ? 'bg-blue-600 border-blue-600 text-white shadow-md' : 'bg-white border-slate-200'}`}>
                                                        {selectedHistoryIds.includes(rec.id) && <span className="icon-wrapper"><Icon name="check" className="w-4 h-4" /></span>}
                                                    </div>
                                                </div>
                                                <div className="flex-1">
                                                    <div className="flex justify-between items-start">
                                                        <div className="flex-1" onClick={() => toggleHistorySelection(rec.id)}>
                                                            <h4 className="font-black text-base text-slate-800">{rec.user}</h4>
                                                            {rec.empId && <p className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">工號：{isAdminMode ? rec.empId : maskEmpId(rec.empId)}</p>}
                                                            <p className="text-[11px] text-slate-400 mt-0.5 font-bold uppercase">{rec.status === 'Checked Out' ? `領用於 ${formatFullDateTime(rec.date)}` : `歸還於 ${formatFullDateTime(rec.returnDate)}`}</p>
                                                            <p className="text-[10px] font-black text-blue-500 mt-1 uppercase">借用時數：{calculateHours(rec.date, rec.returnDate)} 小時</p>
                                                        </div>
                                                        <div className="flex items-center gap-2.5">
                                                            <span className={`text-[10px] font-black px-3 py-1 rounded-full ${rec.status === 'Checked Out' ? 'bg-blue-50 text-blue-600' : 'bg-emerald-50 text-emerald-600'}`}>{rec.status === 'Checked Out' ? '領用中' : '已歸還'}</span>
                                                            {isAdminMode && <button onClick={() => { setIsDeleteModalOpen(true); setPendingDeleteIds([rec.id]); }} className="text-rose-300 p-2 active:text-rose-500 transition-all"><span className="icon-wrapper"><Icon name="trash-2" className="w-6 h-6" /></span></button>}
                                                        </div>
                                                    </div>
                                                    <div className="mt-4 flex flex-wrap gap-2" onClick={() => toggleHistorySelection(rec.id)}>{rec.items.map(i => <span key={i} className="text-xs font-mono font-bold text-slate-500 bg-slate-50 px-3 py-1 border border-slate-100 rounded-lg uppercase">{i}</span>)}</div>
                                                    {isAdminMode && rec.returnCode && rec.status === 'Checked Out' && (
                                                        <div className="mt-3 text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-2 rounded-lg border border-blue-100 tracking-widest uppercase animate-in fade-in">管理員查閱 - 歸還密碼：{rec.returnCode}</div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 border-t border-slate-200 px-6 py-5 flex flex-col z-30 shadow-2xl backdrop-blur-md text-slate-700">
                        <div className="flex justify-between items-center mb-1">
                            <div className="flex space-x-6 sm:space-x-8">
                                <div className="flex flex-col"><span className="text-[10px] text-slate-400 font-black uppercase leading-tight tracking-tighter">借出總數</span><span className="text-xl font-black text-slate-700 leading-none">{totalItemsLent}</span></div>
                                <div className="flex flex-col"><span className="text-[10px] text-slate-400 font-black uppercase leading-tight tracking-tighter text-rose-600">逾期數量</span><span className={`text-xl font-black leading-none ${overdueItemsCount > 0 ? 'text-rose-600' : ''}`}>{overdueItemsCount}</span></div>
                                <div className="flex flex-col"><span className="text-[10px] text-slate-400 font-black uppercase leading-tight tracking-tighter text-blue-700">領用中</span><span className="text-xl font-black text-blue-700 leading-none">{usagePeopleCount}</span></div>
                            </div>
                            <div className="text-[9px] font-black text-slate-300 italic tracking-tighter uppercase text-right leading-tight">Socket<br/>V14.9</div>
                        </div>
                        <div className="pt-2 border-t border-slate-50 flex justify-end">
                            <button onClick={() => isAdminMode ? setIsAdminMode(false) : setIsAdminModalOpen(true)} className={`text-[9px] font-black px-3 py-1 rounded-full border transition-all shadow-sm ${isAdminMode ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-400 border-slate-200'}`}>
                                {isAdminMode ? "🔒 鎖定管理員視圖" : "🔑 解鎖管理員視圖"}
                            </button>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root')); 
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
